[theme]
# Set the base to dark mode
base = "dark"

# A custom purple accent color
primaryColor = "#8A2BE2"

# A very dark gray for the main background
backgroundColor = "#3222a0"

# A slightly lighter gray for the sidebar and widgets
secondaryBackgroundColor = "#b91414"

# Off-white text for readability against the dark background
textColor = "#13ce4e"

# Use a serif font for a more formal look
font = "serif"